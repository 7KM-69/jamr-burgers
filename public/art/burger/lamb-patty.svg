<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800" role="presentation">
  <defs>
    <linearGradient id="lm-face" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#8E4436"/>
      <stop offset="0.34" stop-color="#6E2F24"/>
      <stop offset="0.72" stop-color="#4C1D16"/>
      <stop offset="1" stop-color="#2E100B"/>
    </linearGradient>
    <linearGradient id="lm-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5E271D"/>
      <stop offset="1" stop-color="#210C08"/>
    </linearGradient>
    <linearGradient id="lm-ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4D1C" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#FFB020" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FF4D1C" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Contact-shadow blur box in user space — see patty.svg for why. -->
    <filter id="lm-soft" filterUnits="userSpaceOnUse" x="150" y="496" width="700" height="150">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="lm-glow" x="-30%" y="-50%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <clipPath id="lm-clip">
      <path d="M142 462 C142 438 190 424 268 418 C346 412 420 416 500 416 C580 416 656 412 734 418
               C812 424 858 438 858 462 C858 490 848 508 828 516 C760 540 640 548 500 548
               C360 548 240 540 172 516 C152 508 142 490 142 462 Z"/>
    </clipPath>
  </defs>

  <!-- Contact shadow, not a pillow. Same seam as patty.svg — same seat, same rule. -->
  <ellipse cx="500" cy="552" rx="292" ry="5" fill="#000000" opacity="0.42" filter="url(#lm-soft)"/>

  <path d="M142 462 C142 500 200 528 320 540 C400 548 600 548 680 540 C800 528 858 500 858 462
           C858 528 740 552 500 552 C260 552 142 528 142 500 Z"
        fill="url(#lm-side)"/>

  <path d="M142 462 C142 438 190 424 268 418 C346 412 420 416 500 416 C580 416 656 412 734 418
           C812 424 858 438 858 462 C858 490 848 508 828 516 C760 540 640 548 500 548
           C360 548 240 540 172 516 C152 508 142 490 142 462 Z"
        fill="url(#lm-face)"/>

  <g clip-path="url(#lm-clip)">
    <!-- coarser grind than the beef: lamb is minced, not smashed -->
    <g stroke="#A85742" stroke-width="6" fill="none" opacity="0.3" stroke-linecap="round">
      <path d="M200 444 C280 430 340 446 420 434"/>
      <path d="M470 452 C560 438 620 456 700 442"/>
      <path d="M230 496 C320 482 400 500 480 488"/>
      <path d="M540 502 C630 488 710 506 800 490"/>
    </g>
    <!-- rosemary and cracked pepper -->
    <g fill="#5C7A38" opacity="0.6">
      <ellipse cx="310" cy="456" rx="9" ry="3" transform="rotate(-20 310 456)"/>
      <ellipse cx="560" cy="440" rx="8" ry="3" transform="rotate(15 560 440)"/>
      <ellipse cx="700" cy="492" rx="9" ry="3" transform="rotate(-8 700 492)"/>
      <ellipse cx="400" cy="510" rx="8" ry="3" transform="rotate(24 400 510)"/>
    </g>
    <g fill="#150705" opacity="0.55">
      <ellipse cx="262" cy="470" rx="40" ry="12" transform="rotate(-6 262 470)"/>
      <ellipse cx="500" cy="486" rx="58" ry="11" transform="rotate(3 500 486)"/>
      <ellipse cx="742" cy="466" rx="44" ry="11" transform="rotate(5 742 466)"/>
      <ellipse cx="370" cy="518" rx="46" ry="9"/>
      <ellipse cx="640" cy="522" rx="50" ry="9"/>
    </g>
    <g fill="#FFB020" opacity="0.2">
      <ellipse cx="350" cy="462" rx="22" ry="5"/>
      <ellipse cx="600" cy="470" rx="24" ry="5"/>
    </g>
    <ellipse cx="500" cy="556" rx="300" ry="44" fill="#FF7A2E" opacity="0.35"/>
  </g>

  <path d="M160 498 C260 528 380 542 500 542 C620 542 750 528 840 496"
        fill="none" stroke="url(#lm-ember)" stroke-width="7" filter="url(#lm-glow)" opacity="0.85"/>
</svg>
